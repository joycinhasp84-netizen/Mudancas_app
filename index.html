<!DOCTYPE html>
<html lang="pt-BR">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1f6feb">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mudanças</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<style>
* { box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  padding:8px;
  margin:0;
}

.card {
  background:#fff;
  padding:14px;
  border-radius:14px;
  width:100%;
  max-width:480px;
  margin:auto;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.app-header {
  text-align:center;
}

.app-icon {
  width:80px;
  height:80px;
  object-fit:contain;
  margin-bottom:6px;
}

h2, h3 {
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

label { 
  font-size:14px; 
  font-weight:bold;
}

input, select {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

button {
  padding:11px 12px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
  font-size:14px;
  margin:3px 0;
}

.primary { background:#2563eb; color:white; }
.secondary { background:#e5e7eb; }
.danger { background:#dc2626; color:white; }
.edit { background:#f59e0b; color:white; }

.botoes {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
  font-size:12px;
}

th, td {
  padding:6px;
  border-bottom:1px solid #ddd;
  text-align:left;
}

th { background:#f1f5f9; }

.whatsapp {
  background:#22c55e;
  color:white;
  padding:6px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
  display:inline-block;
  margin-bottom:4px;
}

.acoes button {
  width:100%;
  font-size:12px;
  padding:6px;
}

.fc {
  font-size:12px;
}

.fc-event {
  border-radius:10px;
}

.event-box {
  text-align:center;
  text-transform:uppercase;
  font-size:10px;
  line-height:1.3;
}

.event-cliente { font-weight:800; }
.event-trajeto { font-weight:500; }
.event-km { font-weight:700; }

@media (max-width:420px) {
  table {
    font-size:11px;
  }

  th, td {
    padding:4px;
  }

  .card {
    padding:10px;
  }
}
</style>
</head>

<body>

<div class="card">

<div class="app-header">
  <img src="./icon.png" class="app-icon" alt="Ícone do app">
  <h2>Mudanças</h2>
</div>

<input type="hidden" id="editIndex">

<div class="grid">
  <div>
    <label>Cliente</label>
    <input id="cliente">
  </div>

  <div>
    <label>Telefone</label>
    <input id="telefone" placeholder="11999999999">
  </div>

  <div>
    <label>Data do serviço</label>
    <input type="date" id="data">
  </div>

  <div>
    <label>Dias de viagem</label>
    <select id="dias">
      <option value="1">1 dia</option>
      <option value="2">2 dias</option>
      <option value="3">3 dias</option>
    </select>
  </div>

  <div>
    <label>Distância (km)</label>
    <input type="number" id="km" step="0.1">
  </div>

  <div>
    <label>Local de saída</label>
    <input id="saida">
  </div>

  <div>
    <label>Local de destino</label>
    <input id="destino">
  </div>

  <div>
    <label>Consumo (km/L)</label>
    <input id="kml" value="8">
  </div>

  <div>
    <label>Preço diesel (R$/L)</label>
    <input id="preco" value="7.5">
  </div>

  <div>
    <label>Valor cobrado (R$)</label>
    <input id="cobrado">
  </div>

  <div>
    <label>Custo diesel (R$)</label>
    <input id="diesel" disabled>
  </div>

  <div>
    <label>Lucro (R$)</label>
    <input id="lucro" disabled>
  </div>
</div>

<br>

<div class="botoes">
  <button class="primary" onclick="salvar()">Salvar</button>
  <button class="secondary" onclick="limpar()">Limpar</button>
</div>

<button class="danger" style="width:100%;" onclick="apagarTudo()">Apagar tudo</button>

<h3>📋 Planilha de registros</h3>

<table>
<thead>
<tr>
<th>Data</th>
<th>Cliente</th>
<th>Km</th>
<th>Lucro</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<h3>📆 Calendário</h3>
<div id="calendario"></div>

</div>

<script>
const $ = id => document.getElementById(id);
let calendar;

function corPorCliente(nome) {
  let hash = 0;
  for (let i = 0; i < nome.length; i++) {
    hash = (hash * 31 + nome.charCodeAt(i)) >>> 0;
  }
  return `hsl(${hash % 360} 70% 45%)`;
}

function formatarDataBR(dataISO) {
  const [a,m,d] = dataISO.split("-");
  return `${d}/${m}/${a}`;
}

function somarDias(dataISO, dias) {
  const data = new Date(dataISO + "T00:00:00");
  data.setDate(data.getDate() + dias);
  return data.toISOString().split("T")[0];
}

function calcular() {
  const km = +$("km").value;
  const kml = +$("kml").value;
  const preco = +$("preco").value;
  const cobrado = +$("cobrado").value;

  if (km && kml && preco) {
    const custo = (km / kml) * preco;
    $("diesel").value = custo.toFixed(2);

    if (cobrado) {
      $("lucro").value = (cobrado - custo).toFixed(2);
    }
  }
}

["km","kml","preco","cobrado"].forEach(i =>
  $(i).addEventListener("input", calcular)
);

function dados() {
  return JSON.parse(localStorage.getItem("fretes") || "[]");
}

function salvarDados(lista) {
  localStorage.setItem("fretes", JSON.stringify(lista));
}

function salvar() {
  if (!$("cliente").value || !$("data").value) {
    alert("Preencha pelo menos Cliente e Data do serviço.");
    return;
  }

  const reg = {
    cliente:$("cliente").value,
    telefone:$("telefone").value,
    data:$("data").value,
    dias:+$("dias").value,
    saida:$("saida").value,
    destino:$("destino").value,
    km:+$("km").value,
    cobrado:+$("cobrado").value,
    diesel:+$("diesel").value,
    lucro:+$("lucro").value
  };

  const lista = dados();
  const editIndex = $("editIndex").value;

  if (editIndex !== "") {
    lista[editIndex] = reg;
  } else {
    lista.push(reg);
  }

  salvarDados(lista);
  renderizar();
  atualizarCalendario();
  limpar();
}

function renderizar() {
  const t = $("tabela");
  t.innerHTML = "";

  dados().forEach((r, index) => {
    t.innerHTML += `
    <tr>
      <td>${formatarDataBR(r.data)}<br>${r.dias || 1} dia(s)</td>
      <td>
        <b>${r.cliente}</b><br>
        ${r.saida} → ${r.destino}<br>
        <a class="whatsapp" target="_blank" href="https://wa.me/55${r.telefone}">
          WhatsApp
        </a>
      </td>
      <td>${r.km}</td>
      <td>R$ ${r.lucro}</td>
      <td class="acoes">
        <button class="edit" onclick="editar(${index})">Editar</button>
        <button class="danger" onclick="apagar(${index})">Apagar</button>
      </td>
    </tr>`;
  });
}

function editar(index) {
  const r = dados()[index];

  $("editIndex").value = index;
  $("cliente").value = r.cliente;
  $("telefone").value = r.telefone;
  $("data").value = r.data;
  $("dias").value = r.dias || 1;
  $("saida").value = r.saida;
  $("destino").value = r.destino;
  $("km").value = r.km;
  $("cobrado").value = r.cobrado;
  $("diesel").value = r.diesel;
  $("lucro").value = r.lucro;

  window.scrollTo({ top:0, behavior:"smooth" });
}

function apagar(index) {
  if (!confirm("Deseja apagar este registro?")) return;

  const lista = dados();
  lista.splice(index, 1);
  salvarDados(lista);

  renderizar();
  atualizarCalendario();
}

function iniciarCalendario() {
  calendar = new FullCalendar.Calendar($("calendario"), {
    locale:"pt-br",
    initialView:"dayGridMonth",
    height:"auto",

    eventContent: function(arg) {
      const r = arg.event.extendedProps;
      return {
        html: `
          <div class="event-box">
            <div class="event-cliente">${r.cliente}</div>
            <div class="event-trajeto">${r.saida} → ${r.destino}</div>
            <div class="event-km">(${r.km} KM)</div>
          </div>
        `
      };
    }
  });

  calendar.render();
  atualizarCalendario();
}

function atualizarCalendario() {
  calendar.removeAllEvents();

  dados().forEach(r => {
    const cor = corPorCliente(r.cliente);
    const dias = r.dias || 1;

    for (let i = 0; i < dias; i++) {
      calendar.addEvent({
        start: somarDias(r.data, i),
        allDay:true,
        backgroundColor: cor,
        borderColor: cor,
        extendedProps:r
      });
    }
  });
}

function limpar() {
  [
    "editIndex",
    "cliente",
    "telefone",
    "data",
    "saida",
    "destino",
    "km",
    "cobrado",
    "diesel",
    "lucro"
  ].forEach(i => $(i).value = "");

  $("dias").value = "1";
}

function apagarTudo() {
  if (!confirm("Deseja apagar todos os registros?")) return;

  localStorage.removeItem("fretes");
  renderizar();
  atualizarCalendario();
  limpar();
}

renderizar();
iniciarCalendario();
</script>

</body>
</html>
